<!-- 🔥 نسخة مدمجة احترافية مع إصلاح Firebase -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الرصد المدرسي - نسخة مستقرة</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body style="font-family:Cairo, sans-serif; padding:20px">

<h2>لوحة التحكم</h2>
<button onclick="saveAll()">💾 حفظ البيانات</button>
<button onclick="loadAll()">📥 تحميل البيانات</button>
<button onclick="toggleLock()">🔒 تبديل القفل</button>

<pre id="log"></pre>

<script>
// ================= FIREBASE INIT =================
const firebaseConfig = {
  apiKey: "AIzaSyCKIAk_ww2IDSDpGdBoHwiJi8Wa5PULCoI",
  authDomain: "school-hamza-system.firebaseapp.com",
  projectId: "school-hamza-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// تسجيل دخول تلقائي
firebase.auth().signInAnonymously().catch(()=>{});

// ================= STATE =================
let appData = {
  lockRecording: false,
  students: {},
  updatedAt: null
};

// ================= SAVE =================
async function saveAll(){
  try{
    appData.updatedAt = new Date().toISOString();

    await db.collection("rasid")
      .doc("main")
      .set(appData, { merge: true });

    log("✅ تم الحفظ بدون فقدان بيانات");
  }catch(e){
    log("❌ خطأ: " + e.message);
  }
}

// ================= LOAD =================
async function loadAll(){
  try{
    const doc = await db.collection("rasid").doc("main").get();
    if(doc.exists){
      appData = doc.data();
      log("📥 تم تحميل البيانات");
      log(JSON.stringify(appData, null, 2));
    }
  }catch(e){
    log("❌ خطأ تحميل: " + e.message);
  }
}

// ================= LIVE LISTENER =================
function startLive(){
  db.collection("rasid").doc("main")
  .onSnapshot((doc)=>{
    if(doc.exists){
      appData = doc.data();
      log("🔄 تحديث مباشر من Firebase");
    }
  });
}

// ================= LOCK =================
function toggleLock(){
  appData.lockRecording = !appData.lockRecording;
  log("🔁 حالة القفل: " + appData.lockRecording);
}

// ================= LOG =================
function log(msg){
  document.getElementById("log").textContent += msg + "\n";
}

// ================= INIT =================
startLive();

</script>

</body>
</html>
